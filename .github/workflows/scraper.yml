name: InsideWatch Scraper

on:
  schedule:
    # Tier 1 (FTSE MIB, ~40 co.) — every 15 min on weekdays during Italian market hours
    - cron: '*/15 8-17 * * 1-5'
    # Tier 2 (Mid Cap, ~60 co.) — top of every hour on weekdays
    - cron: '0 8-17 * * 1-5'
    # Tier 3 (all remaining) — three times a day on weekdays
    - cron: '0 7,12,17 * * 1-5'
  workflow_dispatch:
    inputs:
      tier:
        description: 'Max priority tier (1=FTSE MIB only, 2=+Mid Cap, 3=all)'
        required: false
        default: '1'
        type: choice
        options: ['1', '2', '3']

jobs:
  scrape:
    name: Scrape (tier ${{ github.event.inputs.tier || 'auto' }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Determine tier and flags
        id: tier
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TIER="${{ github.event.inputs.tier }}"
          elif [[ "${{ github.event.schedule }}" == "0 7,12,17 * * 1-5" ]]; then
            TIER="3"
          elif [[ "${{ github.event.schedule }}" == "0 8-17 * * 1-5" ]]; then
            TIER="2"
          else
            TIER="1"
          fi
          echo "max_tier=$TIER" >> "$GITHUB_OUTPUT"
          # Tier 1: fast (1s delay, 3 concurrent workers) to finish in <10 min
          # Tier 2/3: polite (2s delay, 1 worker) — fewer runs, less pressure
          if [[ "$TIER" == "1" ]]; then
            echo "delay=1.0" >> "$GITHUB_OUTPUT"
            echo "workers=3" >> "$GITHUB_OUTPUT"
          else
            echo "delay=2.0" >> "$GITHUB_OUTPUT"
            echo "workers=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
        run: |
          python3 -m scraper.run_phase2 \
            --tier ${{ steps.tier.outputs.max_tier }} \
            --delay ${{ steps.tier.outputs.delay }} \
            --workers ${{ steps.tier.outputs.workers }} \
            --max-pdfs 15
