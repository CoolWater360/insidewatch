name: InsideWatch Scraper

on:
  schedule:
    # Tier 1 (FTSE MIB, ~40 co.) — every 15 min on weekdays during Italian market hours
    - cron: '*/15 8-17 * * 1-5'
    # Tier 2 (Mid Cap, ~60 co.) — top of every hour on weekdays
    - cron: '0 8-17 * * 1-5'
    # Tier 3 (all remaining) — three times a day on weekdays
    - cron: '0 7,12,17 * * 1-5'
  workflow_dispatch:
    inputs:
      tier:
        description: 'Max priority tier (1=FTSE MIB only, 2=+Mid Cap, 3=all)'
        required: false
        default: '1'
        type: choice
        options: ['1', '2', '3']

jobs:
  scrape:
    name: Scrape (tier ${{ github.event.inputs.tier || 'auto' }})
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Determine tier
        id: tier
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "max_tier=${{ github.event.inputs.tier }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "0 7,12,17 * * 1-5" ]]; then
            echo "max_tier=3" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "0 8-17 * * 1-5" ]]; then
            echo "max_tier=2" >> "$GITHUB_OUTPUT"
          else
            echo "max_tier=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 -m scraper.run_phase2 \
            --tier ${{ steps.tier.outputs.max_tier }} \
            --delay 2.5 \
            --max-pdfs 15
